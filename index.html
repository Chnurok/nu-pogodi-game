<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ну, погоди!</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; background:#1c1c0e; }
body {
  display:flex; flex-direction:column; align-items:center;
  min-height:100dvh; overflow:hidden;
  touch-action:none; user-select:none; -webkit-user-select:none;
  font-family:'Courier New',monospace;
}
#wrapper {
  display:flex; flex-direction:column; align-items:center;
  width:100%; max-width:420px;
  height:100dvh; padding:6px; gap:5px;
}

/* HUD */
#hud {
  width:100%; flex-shrink:0;
  display:flex; justify-content:space-between; align-items:center;
  background:#111108; border:2px solid #445520; border-radius:5px;
  padding:5px 12px; color:#c8d830;
}
.hb { text-align:center; }
.hl { font-size:0.55rem; color:#667722; text-transform:uppercase; letter-spacing:.05em; }
.hv { font-size:1.1rem; font-weight:bold; color:#d8e830; line-height:1.2; }

/* Game Screen — LCD style */
#screen {
  flex:1; width:100%; position:relative;
  background:#8aae22; /* classic LCD green */
  border:3px solid #334; border-radius:6px;
  overflow:hidden;
  box-shadow:inset 0 0 20px rgba(0,0,0,0.25);
}
canvas { display:block; width:100%; height:100%; }

/* Overlay */
#overlay {
  display:none; position:absolute; inset:0;
  background:rgba(10,18,2,0.88);
  flex-direction:column; align-items:center; justify-content:center;
  gap:10px; z-index:20;
}
#overlay.show { display:flex; }
.ov-title {
  font-size:1.55rem; font-weight:bold; color:#d8e830;
  text-shadow:0 0 20px #c8d030;
  letter-spacing:.12em; text-align:center;
}
.ov-big   { font-size:2.8rem; font-weight:bold; color:#fff; }
.ov-sub   { font-size:.8rem; color:#889933; text-align:center; line-height:1.6; }
.ov-best  { font-size:.9rem; color:#d8e830; }
#playBtn {
  padding:11px 36px; background:#0f1a02;
  border:2px solid #d8e830; border-radius:5px;
  color:#d8e830; font-size:.95rem;
  font-family:'Courier New',monospace; font-weight:bold;
  cursor:pointer; letter-spacing:.1em; margin-top:4px;
}
#playBtn:active { background:#1a2d04; }

/* Controls — 2 × 2 grid */
#controls {
  width:100%; flex-shrink:0;
  display:grid; grid-template-columns:1fr 1fr; gap:6px;
}
.cb {
  padding:15px 0; text-align:center;
  background:#111108; border:2px solid #445520; border-radius:5px;
  font-size:1.3rem; cursor:pointer; color:#c8d830;
  -webkit-tap-highlight-color:transparent;
  transition:background .05s, border-color .05s;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.cb span { font-size:.7rem; color:#889933; letter-spacing:.05em; }
.cb:active { background:#1a2404; border-color:#c8d830; }
</style>
</head>
<body>
<div id="wrapper">

  <!-- HUD -->
  <div id="hud">
    <div class="hb"><div class="hl">Счёт</div><div class="hv" id="hScore">0</div></div>
    <div class="hb"><div class="hl">Рекорд</div><div class="hv" id="hBest">0</div></div>
    <div class="hb"><div class="hl">Уровень</div><div class="hv" id="hLevel">1</div></div>
    <div class="hb"><div class="hl">Жизни</div><div class="hv" id="hLives">♥♥♥</div></div>
  </div>

  <!-- Screen -->
  <div id="screen">
    <canvas id="gc"></canvas>
    <div id="overlay" class="show">
      <div class="ov-title">НУ, ПОГОДИ!</div>
      <div class="ov-sub">Управляй волком:<br>◄► верх · ◄► низ<br>Поймай яйцо в нужную сторону!</div>
      <div class="ov-best" id="ovBest"></div>
      <button id="playBtn">▶ ИГРАТЬ</button>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <div class="cb" id="btnTL">↖ <span>ВЕРХ ЛЕВ</span></div>
    <div class="cb" id="btnTR"><span>ВЕРХ ПРАВ</span> ↗</div>
    <div class="cb" id="btnBL">↙ <span>НИЗ ЛЕВ</span></div>
    <div class="cb" id="btnBR"><span>НИЗ ПРАВ</span> ↘</div>
  </div>

</div>
<script>
// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
// Lane IDs: 0=TL, 1=TR, 2=BL, 3=BR
const LANE_TL=0, LANE_TR=1, LANE_BL=2, LANE_BR=3;
const EGG_DUR_START = 2200; // ms for egg to reach wolf
const EGG_DUR_MIN   = 800;
const SPAWN_INTERVAL_START = 1400;
const SPAWN_INTERVAL_MIN   = 480;
const LCD_BG   = '#8aae22';
const LCD_DARK = '#1a3300';
const LCD_MID  = '#3a6600';
const LCD_LITE = '#aad040';

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let score=0, misses=0, level=1;
let best = +localStorage.getItem('npg2_best')||0;
// Wolf arms: top ∈ {0,1} = left/right; bot ∈ {0,1} = left/right
let wolfTop=0, wolfBot=0; // 0=left, 1=right
let eggs=[], particles=[];
let running=false, raf=null;
let lastTs=0, lastSpawn=0;
let eggDur=EGG_DUR_START, spawnInt=SPAWN_INTERVAL_START;
let tick=0;

const gc=document.getElementById('gc');
const ctx=gc.getContext('2d');
let W=0,H=0;

// ══════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════
let AC=null, musicOn=true, melTimer=null, melIdx=0;
const NOTE=n=>440*Math.pow(2,(n-69)/12);
const BT=60/152; // beat at 152bpm
const MEL=[ // Habanera
  [NOTE(62),.5],[NOTE(62),.25],[NOTE(61),.25],[NOTE(62),.5],
  [NOTE(65),.5],[NOTE(69),.5],[NOTE(65),.25],[NOTE(62),.25],
  [NOTE(62),.5],[NOTE(62),.25],[NOTE(60),.25],[NOTE(62),.5],
  [NOTE(64),.5],[NOTE(62),1.0],
  [NOTE(65),.5],[NOTE(65),.25],[NOTE(64),.25],[NOTE(65),.5],
  [NOTE(67),.5],[NOTE(70),.5],[NOTE(67),.25],[NOTE(65),.25],
  [NOTE(65),.5],[NOTE(65),.25],[NOTE(64),.25],[NOTE(65),.5],
  [NOTE(67),.5],[NOTE(65),1.0],
];
function initAC(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); }
function tone(f,d,tp='square',v=0.1,dl=0){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=tp;o.frequency.value=f;
  const t=AC.currentTime+dl;
  g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(.001,t+d*.9);
  o.start(t);o.stop(t+d+.02);
}
function sfxCatch(){ if(!AC)return;AC.resume(); tone(660,.04,'square',.14);tone(880,.07,'square',.14,.05); }
function sfxMiss(){  if(!AC)return;AC.resume(); tone(200,.06,'sawtooth',.2);tone(140,.14,'sawtooth',.2,.07); }
function sfxOver(){  if(!AC)return;AC.resume(); [440,370,310,200].forEach((f,i)=>tone(f,.2,'square',.15,i*.22)); }
function playMel(){
  if(!musicOn||!AC||!running)return;
  const[f,b]=MEL[melIdx%MEL.length];
  tone(f,b*BT*.8,'square',.06);
  melTimer=setTimeout(()=>{melIdx++;playMel();},b*BT*1000);
}
function stopMel(){ clearTimeout(melTimer);melTimer=null; }

// ══════════════════════════════════════════
// GEOMETRY  (computed each resize)
// ══════════════════════════════════════════
let geo={};
function buildGeo(){
  const cx=W/2, cy=H*.47;
  const mx=W*.1, my=H*.08; // chicken margin
  geo={
    wolfCx:cx, wolfCy:cy,
    // Chicken positions (corners)
    chicken:[
      {x:mx+W*.04,      y:my},           // TL
      {x:W-mx-W*.04,    y:my},           // TR
      {x:mx+W*.04,      y:H-my},         // BL
      {x:W-mx-W*.04,    y:H-my},         // BR
    ],
    // Catch points — where egg meets wolf arm
    catchPt:[
      {x:cx-W*.18, y:cy-H*.16}, // TL arm
      {x:cx+W*.18, y:cy-H*.16}, // TR arm
      {x:cx-W*.18, y:cy+H*.16}, // BL arm
      {x:cx+W*.18, y:cy+H*.16}, // BR arm
    ],
    wolfR: Math.min(W,H)*0.085,
  };
}

// ══════════════════════════════════════════
// WOLF CATCH CHECK
// ══════════════════════════════════════════
function wolfCoversLane(laneId){
  // TL=0: top left arm (wolfTop===0=left)
  // TR=1: top right arm (wolfTop===1=right)
  // BL=2: bot left arm (wolfBot===0=left)
  // BR=3: bot right arm (wolfBot===1=right)
  if(laneId===LANE_TL) return wolfTop===0;
  if(laneId===LANE_TR) return wolfTop===1;
  if(laneId===LANE_BL) return wolfBot===0;
  if(laneId===LANE_BR) return wolfBot===1;
}

// ══════════════════════════════════════════
// DRAW HELPERS
// ══════════════════════════════════════════
function px(c,x,y,w,h){ ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }

function drawBg(){
  ctx.fillStyle=LCD_BG; ctx.fillRect(0,0,W,H);

  // Grid lines (faint)
  ctx.strokeStyle='rgba(20,50,0,0.12)'; ctx.lineWidth=1;
  for(let y=0;y<H;y+=6){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

  // Corner brackets for chickens
  geo.chicken.forEach(c=>{
    ctx.strokeStyle=LCD_MID; ctx.lineWidth=1.5; const s=W*.06;
    const dx=c.x<W/2?1:-1, dy=c.y<H/2?1:-1;
    ctx.beginPath();
    ctx.moveTo(c.x-dx*s,c.y); ctx.lineTo(c.x-dx*s,c.y+dy*s*.5); ctx.lineTo(c.x,c.y+dy*s*.5);
    ctx.stroke();
  });

  // Diagonal guide lines (faint)
  ctx.strokeStyle='rgba(20,70,0,0.18)'; ctx.lineWidth=1;
  ctx.setLineDash([3,8]);
  for(let i=0;i<4;i++){
    const ch=geo.chicken[i], cp=geo.catchPt[i];
    ctx.beginPath(); ctx.moveTo(ch.x,ch.y); ctx.lineTo(cp.x,cp.y); ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawChicken(x,y,laneId){
  const s=W*.038;
  const fl=(laneId===LANE_TR||laneId===LANE_BR); // flip facing
  ctx.save(); ctx.translate(Math.round(x),Math.round(y));
  if(fl) ctx.scale(-1,1);

  // Body
  px(LCD_DARK,-s*.8,-s*.5,s*1.6,s*1.0);
  // Head
  px(LCD_DARK,-s*.55,-s*1.5,s*1.1,s*1.0);
  // Comb
  px(LCD_DARK,-s*.3,-s*2.1,s*.35,s*.65);
  px(LCD_DARK, s*.05,-s*2.2,s*.35,s*.75);
  // Beak
  px(LCD_DARK,s*.5,-s*1.15,s*.55,s*.3);
  // Eye
  px(LCD_LITE,s*.15,-s*1.3,s*.3,s*.3);
  // Wing
  px(LCD_MID,-s*.5,-s*.3,s*.8,s*.6);
  // Legs
  px(LCD_DARK,-s*.4,s*.5,s*.3,s*.5);
  px(LCD_DARK, s*.1,s*.5,s*.3,s*.5);
  // Feet
  px(LCD_DARK,-s*.55,s*.9,s*.5,s*.2);
  px(LCD_DARK,s*.0, s*.9,s*.5,s*.2);

  ctx.restore();
}

function drawWolf(cx,cy,topArm,botArm,catchAnim){
  // topArm: 0=left,1=right — which side top arm extends
  // botArm: 0=left,1=right
  // catchAnim: {side:0-3, t:0-1} for catch flash
  const s=W*.052;
  ctx.save(); ctx.translate(Math.round(cx),Math.round(cy));

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(0,s*.2,s*1.1,s*.28,0,0,Math.PI*2); ctx.fill();

  // Body
  px(LCD_DARK,-s*.7,-s*.9,s*1.4,s*1.1);
  // Chest lighter
  px(LCD_MID,-s*.4,-s*.75,s*.65,s*.7);
  // Head
  px(LCD_DARK,-s*.6,-s*1.9,s*1.2,s*1.0);
  // Ears
  ctx.fillStyle=LCD_DARK;
  ctx.beginPath(); ctx.moveTo(-s*.55,-s*1.9); ctx.lineTo(-s*.8,-s*2.5); ctx.lineTo(-s*.15,-s*1.9); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*.15,-s*1.9); ctx.lineTo(s*.5,-s*2.5);   ctx.lineTo(s*.7,-s*1.9);  ctx.fill();
  // Inner ears
  px(LCD_MID,-s*.6,-s*2.35,s*.35,s*.4);
  px(LCD_MID,s*.25,-s*2.35,s*.35,s*.4);
  // Snout
  px(LCD_MID,-s*.45,-s*1.35,s*.9,s*.5);
  px(LCD_DARK,-s*.15,-s*1.25,s*.3,s*.22); // nose
  // Eyes
  px(LCD_LITE,-s*.5,-s*1.82,s*.32,s*.32);
  px(LCD_LITE, s*.18,-s*1.82,s*.32,s*.32);
  px(LCD_DARK,-s*.38,-s*1.72,s*.14,s*.14);
  px(LCD_DARK, s*.24,-s*1.72,s*.14,s*.14);
  // Legs
  px(LCD_DARK,-s*.55,s*.2,s*.45,s*.18); px(LCD_DARK,-s*.65,s*.35,s*.55,s*.2); // left leg+foot
  px(LCD_DARK, s*.1, s*.2,s*.45,s*.18); px(LCD_DARK, s*.1, s*.35,s*.55,s*.2); // right leg+foot

  // ── TOP ARM ──
  const tDir = topArm===0 ? -1 : 1; // -1=left, 1=right
  const tCaught = catchAnim && (catchAnim.side===LANE_TL&&topArm===0||catchAnim.side===LANE_TR&&topArm===1);
  const tRaise = tCaught ? catchAnim.t*s*.5 : 0;
  ctx.save();
  ctx.translate(tDir*s*.55, -s*.55 - tRaise);
  px(LCD_DARK, -s*.2,-s*.9, s*.4,s*.95); // upper arm
  px(LCD_DARK, tDir>0?s*.1:-s*.5, -s*.2, s*.5,s*.3); // forearm
  // Basket/cap
  ctx.fillStyle=LCD_DARK;
  ctx.beginPath();
  ctx.moveTo(tDir>0?s*.05:-s*.6,-s*.2);
  ctx.lineTo(tDir>0?s*.7:-s*1.2,-s*.2);
  ctx.lineTo(tDir>0?s*.8:-s*1.3,s*.1);
  ctx.lineTo(tDir>0?-s*.05:-s*.5,s*.1);
  ctx.fill();
  ctx.restore();

  // ── BOTTOM ARM ──
  const bDir = botArm===0 ? -1 : 1;
  const bCaught = catchAnim && (catchAnim.side===LANE_BL&&botArm===0||catchAnim.side===LANE_BR&&botArm===1);
  const bRaise = bCaught ? catchAnim.t*s*.5 : 0;
  ctx.save();
  ctx.translate(bDir*s*.55, s*.2 + bRaise);
  px(LCD_DARK, -s*.2, s*.0, s*.4,s*.9);
  px(LCD_DARK, bDir>0?s*.1:-s*.5, s*.75, s*.5,s*.3);
  ctx.fillStyle=LCD_DARK;
  ctx.beginPath();
  ctx.moveTo(bDir>0?s*.05:-s*.6,s*.75);
  ctx.lineTo(bDir>0?s*.7:-s*1.2,s*.75);
  ctx.lineTo(bDir>0?s*.8:-s*1.3,s*1.05);
  ctx.lineTo(bDir>0?-s*.05:-s*.5,s*1.05);
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

function drawEgg(x,y,t,broken){
  const r=W*.04;
  ctx.save(); ctx.translate(Math.round(x),Math.round(y));
  if(!broken){
    ctx.beginPath(); ctx.ellipse(0,0,r,r*1.35,0,0,Math.PI*2);
    ctx.fillStyle=LCD_DARK; ctx.fill();
    ctx.beginPath(); ctx.ellipse(-r*.25,-r*.4,r*.32,r*.42,-0.5,0,Math.PI*2);
    ctx.fillStyle=LCD_MID; ctx.fill();
  } else {
    // Cracked egg
    ctx.fillStyle=LCD_DARK;
    ctx.beginPath(); ctx.ellipse(-r*.4,r*.2,r*.55,r*.5,-.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(r*.4,r*.3,r*.5,r*.45,.3,0,Math.PI*2); ctx.fill();
    // Yolk
    ctx.beginPath(); ctx.arc(0,r*.4,r*.45,0,Math.PI*2);
    ctx.fillStyle=LCD_MID; ctx.fill();
  }
  ctx.restore();
}

let catchAnim=null; // {side, t}
let missAnim=null;  // {x,y,t}

// ══════════════════════════════════════════
// EGGS
// ══════════════════════════════════════════
function spawnEgg(){
  const laneId=Math.floor(Math.random()*4);
  const ch=geo.chicken[laneId], cp=geo.catchPt[laneId];
  eggs.push({ laneId, startX:ch.x, startY:ch.y, endX:cp.x, endY:cp.y, progress:0 });
}

function updateEggs(dt){
  const stepInc = dt*1000/eggDur;
  eggs=eggs.filter(egg=>{
    egg.progress+=stepInc;
    if(egg.progress>=1){
      if(wolfCoversLane(egg.laneId)){
        score++; updateHUD();
        catchAnim={side:egg.laneId, t:0};
        sfxCatch();
      } else {
        misses++; updateHUD();
        missAnim={x:egg.endX,y:egg.endY,t:0};
        sfxMiss();
        if(misses>=3){ endGame(); return false; }
      }
      return false;
    }
    return true;
  });
}

// ══════════════════════════════════════════
// PARTICLES
// ══════════════════════════════════════════
function burst(x,y){
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2, sp=Math.random()*80+30;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-60,
      life:1,dec:2+Math.random()*1.5,sz:Math.random()*4+2});
  }
}
function updateParticles(dt){
  particles=particles.filter(p=>{
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=180*dt; p.life-=p.dec*dt;
    if(p.life>0){ ctx.globalAlpha=p.life; px(LCD_DARK,p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz); }
    return p.life>0;
  });
  ctx.globalAlpha=1;
}

// ══════════════════════════════════════════
// HUD
// ══════════════════════════════════════════
function updateHUD(){
  document.getElementById('hScore').textContent=score;
  level=1+Math.floor(score/8);
  document.getElementById('hLevel').textContent=level;
  const h=['♥','♥','♥'].map((_,i)=>i<misses?'♡':'♥').join('');
  document.getElementById('hLives').textContent=h;
  eggDur=Math.max(EGG_DUR_MIN, EGG_DUR_START-score*55);
  spawnInt=Math.max(SPAWN_INTERVAL_MIN, SPAWN_INTERVAL_START-score*48);
  if(score>best){ best=score; localStorage.setItem('npg2_best',best); document.getElementById('hBest').textContent=best; }
}

// ══════════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════════
function loop(ts){
  if(!running)return;
  const dt=Math.min((ts-lastTs)/1000,.1);
  lastTs=ts; tick++;

  if(ts-lastSpawn>spawnInt){ spawnEgg(); lastSpawn=ts; }

  updateEggs(dt);

  // Catch anim update
  if(catchAnim){ catchAnim.t+=dt*4; if(catchAnim.t>1) catchAnim=null; }
  if(missAnim){  missAnim.t +=dt*3; if(missAnim.t>1)  missAnim=null;  }

  // Draw
  drawBg();
  geo.chicken.forEach((c,i)=>drawChicken(c.x,c.y,i));

  // Draw eggs
  eggs.forEach(egg=>{
    const x=egg.startX+(egg.endX-egg.startX)*egg.progress;
    const y=egg.startY+(egg.endY-egg.startY)*egg.progress;
    drawEgg(x,y,egg.progress,false);
  });

  // Miss animation
  if(missAnim) drawEgg(missAnim.x, missAnim.y, 1, true);

  // Particles
  updateParticles(dt);

  // Wolf
  drawWolf(geo.wolfCx, geo.wolfCy, wolfTop, wolfBot, catchAnim);

  // Screen flash on miss
  if(missAnim&&missAnim.t<0.3){
    ctx.fillStyle=`rgba(180,0,0,${0.18*(1-missAnim.t/0.3)})`;
    ctx.fillRect(0,0,W,H);
  }

  raf=requestAnimationFrame(loop);
}

// ══════════════════════════════════════════
// START / END
// ══════════════════════════════════════════
function startGame(){
  initAC(); AC.resume();
  score=0;misses=0;level=1;
  wolfTop=0;wolfBot=0;
  eggs=[];particles=[];catchAnim=null;missAnim=null;
  eggDur=EGG_DUR_START;spawnInt=SPAWN_INTERVAL_START;
  tick=0;
  updateHUD();
  document.getElementById('hBest').textContent=best;
  document.getElementById('overlay').classList.remove('show');
  running=true;
  lastTs=performance.now(); lastSpawn=performance.now();
  melIdx=0;
  if(musicOn) setTimeout(playMel,300);
  raf=requestAnimationFrame(loop);
}

function endGame(){
  running=false; stopMel(); cancelAnimationFrame(raf);
  sfxOver();
  setTimeout(()=>{
    const ov=document.getElementById('overlay');
    ov.innerHTML=`
      <div class="ov-title">КОНЕЦ ИГРЫ</div>
      <div class="ov-big">${score}</div>
      <div class="ov-sub">уровень ${level} · ${misses>=3?'3 промаха':'игра окончена'}</div>
      <div class="ov-best">🏆 Рекорд: ${best}</div>
      <button id="playBtn" style="margin-top:8px">▶ ЕЩЁ РАЗ</button>
    `;
    ov.classList.add('show');
    document.getElementById('playBtn').addEventListener('click',startGame);
  },900);
}

// ══════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════
function setWolf(q){
  if(!running)return;
  if(q===LANE_TL){ wolfTop=0; }
  if(q===LANE_TR){ wolfTop=1; }
  if(q===LANE_BL){ wolfBot=0; }
  if(q===LANE_BR){ wolfBot=1; }
  if(navigator.vibrate)navigator.vibrate(8);
}
document.getElementById('btnTL').addEventListener('pointerdown',e=>{e.preventDefault();setWolf(LANE_TL);});
document.getElementById('btnTR').addEventListener('pointerdown',e=>{e.preventDefault();setWolf(LANE_TR);});
document.getElementById('btnBL').addEventListener('pointerdown',e=>{e.preventDefault();setWolf(LANE_BL);});
document.getElementById('btnBR').addEventListener('pointerdown',e=>{e.preventDefault();setWolf(LANE_BR);});
document.getElementById('playBtn').addEventListener('click',startGame);

document.addEventListener('keydown',e=>{
  if(e.key==='q'||e.key==='Q'||e.key==='ArrowLeft')  setWolf(LANE_TL);
  if(e.key==='e'||e.key==='E'||e.key==='ArrowRight') setWolf(LANE_TR);
  if(e.key==='z'||e.key==='Z') setWolf(LANE_BL);
  if(e.key==='c'||e.key==='C') setWolf(LANE_BR);
  if(e.key==='a'||e.key==='A') setWolf(LANE_BL);
  if(e.key==='d'||e.key==='D') setWolf(LANE_BR);
});

// ══════════════════════════════════════════
// RESIZE
// ══════════════════════════════════════════
function resize(){
  const wrap=document.getElementById('screen');
  W=wrap.clientWidth; H=wrap.clientHeight;
  gc.width=W; gc.height=H;
  buildGeo();
  if(!running){ drawBg(); geo.chicken.forEach((c,i)=>drawChicken(c.x,c.y,i)); drawWolf(geo.wolfCx,geo.wolfCy,wolfTop,wolfBot,null); }
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
if(window.Telegram?.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();}
document.getElementById('hBest').textContent=best;
document.getElementById('ovBest').textContent=best>0?`Рекорд: ${best}`:'';
window.addEventListener('resize',resize);
resize();
</script>
</body>
</html>
